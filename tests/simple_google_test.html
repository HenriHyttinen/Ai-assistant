<!DOCTYPE html>
<html>
<head>
    <title>Simple Google OAuth Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .url { background: #f0f0f0; padding: 10px; margin: 10px 0; word-break: break-all; }
        button { padding: 10px 20px; background: #4285f4; color: white; border: none; cursor: pointer; margin: 5px; }
        button:hover { background: #3367d6; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Simple Google OAuth Test</h1>
    
    <div class="url">
        <strong>Backend OAuth URL:</strong><br>
        <code id="oauth-url">Loading...</code>
    </div>
    
    <button onclick="testGoogleOAuth()">Test Google OAuth (Open in New Tab)</button>
    <button onclick="testDirectGoogle()">Test Direct Google URL</button>
    
    <div id="results"></div>

    <script>
        // Load the OAuth URL from backend
        async function loadOAuthUrl() {
            try {
                const response = await fetch('http://localhost:8000/auth/oauth/google');
                const data = await response.json();
                document.getElementById('oauth-url').textContent = data.url;
                return data.url;
            } catch (error) {
                document.getElementById('oauth-url').textContent = 'Error: ' + error.message;
                return null;
            }
        }
        
        function testGoogleOAuth() {
            const url = document.getElementById('oauth-url').textContent;
            if (url && url.startsWith('https://')) {
                window.open(url, '_blank');
                addResult('✅ Opened Google OAuth URL in new tab. Check if you get a 404 error.', 'success');
            } else {
                addResult('❌ No valid OAuth URL available', 'error');
            }
        }
        
        function testDirectGoogle() {
            const directUrl = 'https://accounts.google.com/oauth/authorize?client_id=648667093069-fm40k77lpjutqfuie2ar5lhm11g0toag.apps.googleusercontent.com&redirect_uri=http://127.0.0.1:8000/auth/oauth/google/callback&scope=openid%20email%20profile&response_type=code';
            window.open(directUrl, '_blank');
            addResult('✅ Opened direct Google OAuth URL in new tab. Check if you get a 404 error.', 'success');
        }
        
        function addResult(message, type) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Load OAuth URL on page load
        loadOAuthUrl();
    </script>
</body>
</html>
